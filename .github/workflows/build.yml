name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate project files
      run: |
        rm -rf appapp
        mkdir -p app/src/main/java/com/lockgesture
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/xml

        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
            <uses-permission android:name="android.permission.CAMERA"/>
            <uses-permission android:name="android.permission.FLASHLIGHT"/>
            <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
            <application
                android:allowBackup="true"
                android:label="LockGesture"
                android:theme="@style/Theme.LockGesture">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
                <service android:name=".OverlayService" android:foregroundServiceType="specialUse" android:exported="false"/>
                <service android:name=".GestureAccessibilityService" android:exported="true" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE">
                    <intent-filter>
                        <action android:name="android.accessibilityservice.AccessibilityService"/>
                    </intent-filter>
                    <meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config"/>
                </service>
                <receiver android:name=".BootReceiver" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.BOOT_COMPLETED"/>
                    </intent-filter>
                </receiver>
            </application>
        </manifest>
        EOF

        cat > app/src/main/res/xml/accessibility_service_config.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
            android:accessibilityEventTypes="typeAllMask"
            android:accessibilityFlags="flagDefault"
            android:canPerformGestures="true"
            android:description="@string/accessibility_description"
            android:notificationTimeout="100"
            android:settingsActivity=".MainActivity"/>
        EOF

        cat > app/src/main/res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">LockGesture</string>
            <string name="accessibility_description">LockGesture cần trợ năng để thực hiện hành động trên màn hình khoá</string>
        </resources>
        EOF

        cat > app/src/main/res/values/themes.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="Theme.LockGesture" parent="Theme.MaterialComponents.DayNight.DarkActionBar"/>
        </resources>
        EOF

        cat > app/src/main/res/values/arrays.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string-array name="actions">
                <item>Không làm gì</item>
                <item>Tắt màn hình</item>
                <item>Mở Camera</item>
                <item>Bật/Tắt Flash</item>
            </string-array>
        </resources>
        EOF

        cat > app/src/main/res/layout/activity_main.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#1a1a2e">
            <LinearLayout
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:orientation="vertical"
                android:padding="16dp">
                <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                    android:text="LockGesture" android:textSize="28sp" android:textColor="#e0e0e0"
                    android:textStyle="bold" android:layout_marginBottom="4dp"/>
                <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                    android:text="Gesture overlay cho màn hình khoá" android:textSize="13sp"
                    android:textColor="#888" android:layout_marginBottom="20dp"/>
                <Button android:id="@+id/btnOverlayPermission" android:layout_width="match_parent"
                    android:layout_height="wrap_content" android:text="1. Cấp quyền Overlay" android:layout_marginBottom="8dp"/>
                <Button android:id="@+id/btnAccessibility" android:layout_width="match_parent"
                    android:layout_height="wrap_content" android:text="2. Bật Trợ năng" android:layout_marginBottom="8dp"/>
                <Button android:id="@+id/btnToggleService" android:layout_width="match_parent"
                    android:layout_height="wrap_content" android:text="3. BẬT OVERLAY"
                    android:backgroundTint="#4CAF50" android:layout_marginBottom="20dp"/>
                <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                    android:text="GÁN GESTURE" android:textColor="#888" android:textSize="12sp" android:layout_marginBottom="8dp"/>
                <LinearLayout android:id="@+id/rowDoubleTap" android:layout_width="match_parent"
                    android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginBottom="8dp">
                    <TextView android:id="@+id/tv0" android:layout_width="0dp" android:layout_height="wrap_content"
                        android:layout_weight="1" android:text="Double Tap" android:textColor="#e0e0e0" android:gravity="center_vertical"/>
                    <Spinner android:id="@+id/sp0" android:layout_width="wrap_content" android:layout_height="wrap_content" android:entries="@array/actions"/>
                </LinearLayout>
                <LinearLayout android:id="@+id/rowLongPress" android:layout_width="match_parent"
                    android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginBottom="8dp">
                    <TextView android:id="@+id/tv1" android:layout_width="0dp" android:layout_height="wrap_content"
                        android:layout_weight="1" android:text="Long Press" android:textColor="#e0e0e0" android:gravity="center_vertical"/>
                    <Spinner android:id="@+id/sp1" android:layout_width="wrap_content" android:layout_height="wrap_content" android:entries="@array/actions"/>
                </LinearLayout>
                <LinearLayout android:id="@+id/rowSwipeUp" android:layout_width="match_parent"
                    android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginBottom="8dp">
                    <TextView android:id="@+id/tv2" android:layout_width="0dp" android:layout_height="wrap_content"
                        android:layout_weight="1" android:text="Swipe Up" android:textColor="#e0e0e0" android:gravity="center_vertical"/>
                    <Spinner android:id="@+id/sp2" android:layout_width="wrap_content" android:layout_height="wrap_content" android:entries="@array/actions"/>
                </LinearLayout>
                <LinearLayout android:id="@+id/rowSwipeDown" android:layout_width="match_parent"
                    android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginBottom="8dp">
                    <TextView android:id="@+id/tv3" android:layout_width="0dp" android:layout_height="wrap_content"
                        android:layout_weight="1" android:text="Swipe Down" android:textColor="#e0e0e0" android:gravity="center_vertical"/>
                    <Spinner android:id="@+id/sp3" android:layout_width="wrap_content" android:layout_height="wrap_content" android:entries="@array/actions"/>
                </LinearLayout>
                <LinearLayout android:id="@+id/rowSwipeLeft" android:layout_width="match_parent"
                    android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginBottom="8dp">
                    <TextView android:id="@+id/tv4" android:layout_width="0dp" android:layout_height="wrap_content"
                        android:layout_weight="1" android:text="Swipe Left" android:textColor="#e0e0e0" android:gravity="center_vertical"/>
                    <Spinner android:id="@+id/sp4" android:layout_width="wrap_content" android:layout_height="wrap_content" android:entries="@array/actions"/>
                </LinearLayout>
                <LinearLayout android:id="@+id/rowSwipeRight" android:layout_width="match_parent"
                    android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginBottom="8dp">
                    <TextView android:id="@+id/tv5" android:layout_width="0dp" android:layout_height="wrap_content"
                        android:layout_weight="1" android:text="Swipe Right" android:textColor="#e0e0e0" android:gravity="center_vertical"/>
                    <Spinner android:id="@+id/sp5" android:layout_width="wrap_content" android:layout_height="wrap_content" android:entries="@array/actions"/>
                </LinearLayout>
            </LinearLayout>
        </ScrollView>
        EOF

        cat > app/src/main/java/com/lockgesture/MainActivity.kt << 'EOF'
        package com.lockgesture
        import android.content.Intent
        import android.net.Uri
        import android.os.Bundle
        import android.provider.Settings
        import android.widget.Button
        import android.widget.Spinner
        import androidx.appcompat.app.AppCompatActivity

        class MainActivity : AppCompatActivity() {
            private val gestureKeys = listOf("double_tap","long_press","swipe_up","swipe_down","swipe_left","swipe_right")
            private val spinnerIds = listOf(R.id.sp0, R.id.sp1, R.id.sp2, R.id.sp3, R.id.sp4, R.id.sp5)

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_main)
                val prefs = getSharedPreferences("gestures", MODE_PRIVATE)

                spinnerIds.forEachIndexed { i, id ->
                    val sp = findViewById<Spinner>(id)
                    sp.setSelection(prefs.getInt(gestureKeys[i], 0))
                    sp.onItemSelectedListener = object : android.widget.AdapterView.OnItemSelectedListener {
                        override fun onItemSelected(p: android.widget.AdapterView<*>?, v: android.view.View?, pos: Int, id: Long) {
                            prefs.edit().putInt(gestureKeys[i], pos).apply()
                        }
                        override fun onNothingSelected(p: android.widget.AdapterView<*>?) {}
                    }
                }

                findViewById<Button>(R.id.btnOverlayPermission).setOnClickListener {
                    if (!Settings.canDrawOverlays(this))
                        startActivity(Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:$packageName")))
                }
                findViewById<Button>(R.id.btnAccessibility).setOnClickListener {
                    startActivity(Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS))
                }
                val btn = findViewById<Button>(R.id.btnToggleService)
                btn.setOnClickListener {
                    if (OverlayService.isRunning) {
                        stopService(Intent(this, OverlayService::class.java))
                        btn.text = "3. BẬT OVERLAY"
                        btn.backgroundTintList = android.content.res.ColorStateList.valueOf(0xFF4CAF50.toInt())
                    } else {
                        startForegroundService(Intent(this, OverlayService::class.java))
                        btn.text = "3. TẮT OVERLAY"
                        btn.backgroundTintList = android.content.res.ColorStateList.valueOf(0xFFF44336.toInt())
                    }
                }
            }
            override fun onResume() {
                super.onResume()
                val btn = findViewById<Button>(R.id.btnToggleService)
                if (OverlayService.isRunning) {
                    btn.text = "3. TẮT OVERLAY"
                    btn.backgroundTintList = android.content.res.ColorStateList.valueOf(0xFFF44336.toInt())
                }
            }
        }
        EOF

        cat > app/src/main/java/com/lockgesture/OverlayService.kt << 'EOF'
        package com.lockgesture
        import android.app.*
        import android.content.Context
        import android.content.Intent
        import android.graphics.Color
        import android.graphics.PixelFormat
        import android.os.IBinder
        import android.view.*
        import androidx.core.app.NotificationCompat

        class OverlayService : Service() {
            companion object { var isRunning = false }
            private lateinit var wm: WindowManager
            private lateinit var overlay: View
            private lateinit var gd: GestureDetector

            override fun onCreate() {
                super.onCreate()
                isRunning = true
                val ch = NotificationChannel("lg","LockGesture", NotificationManager.IMPORTANCE_LOW)
                (getSystemService(NOTIFICATION_SERVICE) as NotificationManager).createNotificationChannel(ch)
                startForeground(1, NotificationCompat.Builder(this,"lg")
                    .setContentTitle("LockGesture đang chạy")
                    .setSmallIcon(android.R.drawable.ic_menu_compass).build())

                wm = getSystemService(WINDOW_SERVICE) as WindowManager
                val prefs = getSharedPreferences("gestures", Context.MODE_PRIVATE)
                overlay = View(this).apply { setBackgroundColor(Color.TRANSPARENT) }

                gd = GestureDetector(this, object : GestureDetector.SimpleOnGestureListener() {
                    override fun onDoubleTap(e: MotionEvent): Boolean {
                        Actions.execute(this@OverlayService, prefs.getInt("double_tap",0)); return true
                    }
                    override fun onLongPress(e: MotionEvent) {
                        Actions.execute(this@OverlayService, prefs.getInt("long_press",0))
                    }
                    override fun onFling(e1: MotionEvent?, e2: MotionEvent, vX: Float, vY: Float): Boolean {
                        val dx = e2.x-(e1?.x?:0f); val dy = e2.y-(e1?.y?:0f)
                        if (Math.abs(dx)>Math.abs(dy)) {
                            if (dx>0) Actions.execute(this@OverlayService, prefs.getInt("swipe_right",0))
                            else Actions.execute(this@OverlayService, prefs.getInt("swipe_left",0))
                        } else {
                            if (dy>0) Actions.execute(this@OverlayService, prefs.getInt("swipe_down",0))
                            else Actions.execute(this@OverlayService, prefs.getInt("swipe_up",0))
                        }
                        return true
                    }
                })
                overlay.setOnTouchListener { _, event -> gd.onTouchEvent(event); true }

                val params = WindowManager.LayoutParams(
                    WindowManager.LayoutParams.MATCH_PARENT, 160,
                    WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
                    WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE or
                    WindowManager.LayoutParams.FLAG_SHOW_WHEN_LOCKED or
                    WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN,
                    PixelFormat.TRANSLUCENT
                ).apply { gravity = Gravity.BOTTOM }
                wm.addView(overlay, params)
            }
            override fun onDestroy() {
                super.onDestroy(); isRunning = false
                if (::overlay.isInitialized) wm.removeView(overlay)
            }
            override fun onBind(intent: Intent?): IBinder? = null
        }
        EOF

        cat > app/src/main/java/com/lockgesture/Actions.kt << 'EOF'
        package com.lockgesture
        import android.content.Context
        import android.content.Intent
        import android.hardware.camera2.CameraManager
        import android.provider.MediaStore

        object Actions {
            private var flashOn = false
            fun execute(ctx: Context, action: Int) = when(action) {
                1 -> GestureAccessibilityService.instance?.performGlobalAction(
                        android.accessibilityservice.AccessibilityService.GLOBAL_ACTION_LOCK_SCREEN)
                2 -> ctx.startActivity(Intent(MediaStore.INTENT_ACTION_STILL_IMAGE_CAMERA_SECURE).apply { flags=Intent.FLAG_ACTIVITY_NEW_TASK })
                3 -> { val cm=ctx.getSystemService(Context.CAMERA_SERVICE) as CameraManager
                       flashOn=!flashOn; cm.setTorchMode(cm.cameraIdList[0], flashOn) }
                else -> null
            }
        }
        EOF

        cat > app/src/main/java/com/lockgesture/GestureAccessibilityService.kt << 'EOF'
        package com.lockgesture
        import android.accessibilityservice.AccessibilityService
        import android.view.accessibility.AccessibilityEvent

        class GestureAccessibilityService : AccessibilityService() {
            companion object { var instance: GestureAccessibilityService? = null }
            override fun onServiceConnected() { instance = this }
            override fun onAccessibilityEvent(e: AccessibilityEvent?) {}
            override fun onInterrupt() {}
            override fun onDestroy() { super.onDestroy(); instance = null }
        }
        EOF

        cat > app/src/main/java/com/lockgesture/BootReceiver.kt << 'EOF'
        package com.lockgesture
        import android.content.BroadcastReceiver
        import android.content.Context
        import android.content.Intent

        class BootReceiver : BroadcastReceiver() {
            override fun onReceive(ctx: Context, intent: Intent) {
                if (intent.action == Intent.ACTION_BOOT_COMPLETED)
                    ctx.startForegroundService(Intent(ctx, OverlayService::class.java))
            }
        }
        EOF

    - name: Setup Gradle Wrapper
      run: |
        cat > gradlew << 'GRADLEW'
        #!/bin/sh
        exec "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" "$@"
        GRADLEW
        chmod +x gradlew
        mkdir -p gradle/wrapper
        wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /opt/gradle
        export PATH=$PATH:/opt/gradle/gradle-8.4/bin
        gradle wrapper --gradle-version=8.4
        chmod +x gradlew

        - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LockGesture-debug
        path: app/build/outputs/apk/debug/app-debug.apk
